name: Publish to MCP Registry

# Publishes server.json to the official MCP registry using GitHub OIDC.
# Running inside a node-opcua-owned repo automatically grants the
# io.github.node-opcua/* namespace — no user token, no OAuth app policy.
#
# Triggers: every published GitHub release, or manually via Run workflow.
# Prerequisite: the npm package version referenced by server.json must
# already be on npmjs.org (its package.json carries the matching mcpName).

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  id-token: write # mint the OIDC token
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -sSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          ./mcp-publisher --version

      - name: Login (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json
        run: ./mcp-publisher publish
